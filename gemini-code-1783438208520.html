<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empfangssystem (Theke)</title>
    <style>
        body { font-family: sans-serif; background: #e9ecef; padding: 20px; }
        .bestell-liste { display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; }
        .bestell-karte { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .bestell-inhalt h3 { margin: 0 0 10px 0; color: #333; }
        .bestell-inhalt p { margin: 0; font-size: 1.1em; color: #555; white-space: pre-line; }
        .btn-loeschen { background: #dc3545; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-loeschen:hover { background: #bd2130; }
        .keine-bestellungen { text-align: center; color: #777; font-style: italic; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Eingegangene Bestellungen (Tresen)</h2>
    
    <div class="bestell-liste" id="bestell-liste">
        <!-- Hier landen die Bestellungen dynamisch -->
    </div>

    <script>
        const bc = new BroadcastChannel('cafe_bestellungen');
        
        // 1. Aus dem LocalStorage laden (Dauerhaftigkeit auch nach Schließen/Aktualisieren!)
        let bestellungen = JSON.parse(localStorage.getItem('cafeBestellungen')) || [];

        // Direkt beim Start rendern
        document.addEventListener("DOMContentLoaded", () => {
            renderBestellungen();
        });

        // Auf neue Bestellungen über den Kanal hören
        bc.onmessage = function(event) {
            neueBestellungEintragen(event.data);
        };

        function neueBestellungEintragen(daten) {
            const neueBestellung = {
                // Eindeutige ID generieren (Kombination aus Zeitstempel und Zufall) zum sicheren Löschen
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                tisch: daten.tisch,
                artikel: daten.artikel,
                zeit: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })
            };

            bestellungen.push(neueBestellung);
            speichereDaten();
            renderBestellungen();
        }

        function renderBestellungen() {
            const liste = document.getElementById('bestell-liste');
            liste.innerHTML = '';

            if (bestellungen.length === 0) {
                liste.innerHTML = '<p class="keine-bestellungen">Aktuell keine offenen Bestellungen.</p>';
                return;
            }

            bestellungen.forEach(b => {
                const karte = document.createElement('div');
                karte.className = 'bestell-karte';
                karte.innerHTML = `
                    <div class="bestell-inhalt">
                        <h3>Tisch ${b.tisch} <span style="font-size: 0.8em; font-weight: normal; color:#888;"> um ${b.zeit} Uhr</span></h3>
                        <p>${b.artikel}</p>
                    </div>
                    <!-- REPARIERTER BUTTON: Löscht exakt über die ID -->
                    <button class="btn-loeschen" onclick="loescheBestellung('${b.id}')">Gelöscht / Erledigt</button>
                `;
                liste.appendChild(karte);
            });
        }

        // REPARIERTE LÖSCHFUNKTION
        function loescheBestellung(id) {
            // Filtere die Liste, sodass das Element mit der ID verschwindet
            bestellungen = bestellungen.filter(b => b.id !== id);
            
            // WICHTIG: Die gefilterte Liste sofort wieder sichern!
            speichereDaten();
            
            // Anzeige neu aufbauen
            renderBestellungen();
        }

        function speichereDaten() {
            localStorage.setItem('cafeBestellungen', JSON.stringify(bestellungen));
        }
    </script>
</body>
</html>
