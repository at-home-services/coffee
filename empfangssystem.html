<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empfangssystem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .bestell-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .bestellung {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bestellung:last-child {
            border-bottom: none;
        }
        .bestell-details {
            flex-grow: 1;
        }
        .tisch-nummer {
            font-weight: bold;
            color: #4CAF50;
        }
        .btn-loeschen {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-loeschen:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>

    <h1>Eingegangene Bestellungen</h1>

    <div class="bestell-container" id="bestell-liste">
        <!-- Bestellungen werden hier dynamisch eingefügt -->
    </div>

    <script>
        const bc = new BroadcastChannel('cafe_bestellungen');
        // Daten persistent aus dem LocalStorage laden
        let bestellungen = JSON.parse(localStorage.getItem('cafeBestellungen')) || [];

        document.addEventListener("DOMContentLoaded", () => {
            renderBestellungen();
        });

        bc.onmessage = function(event) {
            neueBestellungEintragen(event.data);
        };

        function neueBestellungEintragen(daten) {
            const neueBestellung = {
                id: Date.now() + Math.random().toString(36).substr(2, 9), // Sichere, einzigartige ID
                tisch: daten.tisch,
                artikel: daten.artikel
            };

            bestellungen.push(neueBestellung);
            speichereDaten();
            renderBestellungen();
        }

        function renderBestellungen() {
            const liste = document.getElementById('bestell-liste');
            if (!liste) return;
            liste.innerHTML = '';

            if (bestellungen.length === 0) {
                liste.innerHTML = '<p style="text-align:center; color:#777;">Keine offenen Bestellungen.</p>';
                return;
            }

            bestellungen.forEach(b => {
                const eintrag = document.createElement('div');
                eintrag.className = 'bestellung';
                eintrag.innerHTML = `
                    <div class="bestell-details">
                        <span class="tisch-nummer">Tisch ${b.tisch}</span>
                        <p style="margin: 5px 0 0 0; white-space: pre-line;">${b.artikel}</p>
                    </div>
                    <button class="btn-loeschen" onclick="loescheBestellung('${b.id}')">Gelöscht</button>
                `;
                liste.appendChild(eintrag);
            });
        }

        // Reparierte Löschfunktion über eindeutige ID
        function loescheBestellung(id) {
            bestellungen = bestellungen.filter(b => b.id !== id);
            speichereDaten(); // Änderungen sofort im Browser fixieren
            renderBestellungen();
        }

        function speichereDaten() {
            localStorage.setItem('cafeBestellungen', JSON.stringify(bestellungen));
        }
    </script>
</body>
</html>
