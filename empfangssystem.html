<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empfangssystem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        .bestellung {
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bestellung:last-child {
            border-bottom: none;
        }
        .btn-loeschen {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-loeschen:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>

    <h1>Empfangssystem</h1>

    <div class="container" id="bestell-liste">
        <!-- Bestellungen werden hier dynamisch eingefügt -->
    </div>

    <script>
        const bc = new BroadcastChannel('cafe_bestellungen');
        // Persistente Daten direkt aus dem LocalStorage laden
        let bestellungen = JSON.parse(localStorage.getItem('cafeBestellungen')) || [];

        document.addEventListener("DOMContentLoaded", () => {
            renderBestellungen();
        });

        bc.onmessage = function(event) {
            neueBestellungEintragen(event.data);
        };

        function neueBestellungEintragen(daten) {
            const neueBestellung = {
                id: Date.now() + Math.random().toString(36).substr(2, 9), // Generiert eine eindeutige ID zum fehlerfreien Löschen
                tisch: daten.tisch,
                artikel: daten.artikel
            };

            bestellungen.push(neueBestellung);
            speichereDaten();
            renderBestellungen();
        }

        function renderBestellungen() {
            const liste = document.getElementById('bestell-liste');
            if (!liste) return;
            liste.innerHTML = '';

            if (bestellungen.length === 0) {
                liste.innerHTML = '<p style="text-align:center; color:#777;">Keine Bestellungen vorhanden.</p>';
                return;
            }

            bestellungen.forEach(b => {
                const eintrag = document.createElement('div');
                eintrag.className = 'bestellung';
                eintrag.innerHTML = `
                    <div>
                        <strong>Tisch ${b.tisch}:</strong>
                        <p style="margin: 5px 0 0 0; white-space: pre-line;">${b.artikel}</p>
                    </div>
                    <button class="btn-loeschen" onclick="loescheBestellung('${b.id}')">Gelöscht</button>
                `;
                liste.appendChild(eintrag);
            });
        }

        // Reparierte Löschfunktion
        function loescheBestellung(id) {
            // Filtere das Element anhand der ID sauber heraus
            bestellungen = bestellungen.filter(b => b.id !== id);
            speichereDaten(); // Aktualisierung direkt im Browser-Speicher absichern
            renderBestellungen();
        }

        function speichereDaten() {
            localStorage.setItem('cafeBestellungen', JSON.stringify(bestellungen));
        }
    </script>
</body>
</html>
