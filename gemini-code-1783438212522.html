<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellsystem</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .block { background: #f4f4f4; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        video { width: 100%; max-height: 300px; background: #000; display: none; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>Digitales Bestellsystem</h2>
    
    <div class="block">
        <h3 id="tisch-anzeige">Lade Tisch...</h3>
        <button onclick="starteNativenScanner()">QR-Code scannen (Kamera)</button>
        <video id="scanner-video" autoplay playsinline></video>
    </div>

    <div class="block">
        <h3>Deine Bestellung</h3>
        <textarea id="artikel-eingabe" placeholder="z.B. 1x Cappuccino, 1x Croissant" rows="4" style="width:100%;"></textarea>
        <br><br>
        <button onclick="sendeBestellung()">Kostenpflichtig Bestellen</button>
    </div>

    <script>
        const bc = new BroadcastChannel('cafe_bestellungen');

        // Tisch beim Laden zuweisen und halten
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            let tisch = urlParams.get('tisch');

            if (tisch) {
                localStorage.setItem('aktuellerTisch', tisch);
            } else {
                tisch = localStorage.getItem('aktuellerTisch');
            }

            aktualisiereTischAnzeige();
        });

        function aktualisiereTischAnzeige() {
            const tisch = localStorage.getItem('aktuellerTisch');
            const anzeige = document.getElementById('tisch-anzeige');
            if (tisch) {
                anzeige.innerText = `Tisch Nummer: ${tisch}`;
            } else {
                anzeige.innerText = "Kein Tisch ausgewählt. Bitte QR-Code scannen.";
            }
        }

        // Nativer QR-Code Scanner ohne externe Bibliotheken
        async function starteNativenScanner() {
            const video = document.getElementById('scanner-video');
            
            if (!('BarcodeDetector' in window)) {
                // Fallback für Browser, die BarcodeDetector noch nicht nativ unterstützen (z.B. ältere iOS/Safarigebote)
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.capture = 'environment';
                fileInput.click();
                
                fileInput.onchange = async (e) => {
                    alert("Kamera-Dateimodus aktiviert. Für vollautomatischen Live-Scan nutzen Sie bitte einen modernen Browser (Chrome/Edge/Safari aktuell).");
                };
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.style.display = "block";

                const barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
                
                const scanIntervall = setInterval(async () => {
                    try {
                        const barcodes = await barcodeDetector.detect(video);
                        if (barcodes.length > 0) {
                            const qrCodeUrl = barcodes[0].rawValue;
                            clearInterval(scanIntervall);
                            
                            // Stream stoppen
                            stream.getTracks().forEach(track => track.stop());
                            video.style.display = "none";

                            // URL parsen und Tisch extrahieren
                            const url = new URL(qrCodeUrl);
                            const tischParam = url.searchParams.get('tisch');
                            if (tischParam) {
                                localStorage.setItem('aktuellerTisch', tischParam);
                                aktualisiereTischAnzeige();
                                alert(`Tisch ${tischParam} erfolgreich erkannt!`);
                            }
                        }
                    } catch (err) {
                        console.error("Erkennungsfehler:", err);
                    }
                }, 500);

            } catch (err) {
                alert("Kamera-Zugriff verweigert oder nicht verfügbar.");
            }
        }

        // Bestellung senden – Tisch bleibt danach im LocalStorage gespeichert!
        function sendeBestellung() {
            const tisch = localStorage.getItem('aktuellerTisch');
            const artikel = document.getElementById('artikel-eingabe').value.trim();

            if (!tisch) {
                alert("Fehler: Kein Tisch zugewiesen!");
                return;
            }
            if (!artikel) {
                alert("Bitte gib ein, was du bestellen möchtest.");
                return;
            }

            const bestellDaten = {
                tisch: tisch,
                artikel: artikel
            };

            // Senden via BroadcastChannel ans Empfangssystem
            bc.postMessage(bestellDaten);

            alert("Bestellung erfolgreich abgesendet!");
            document.getElementById('artikel-eingabe').value = '';
        }
    </script>
</body>
</html>
