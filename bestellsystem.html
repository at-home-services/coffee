<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellsystem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4CAF50;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        .btn:hover {
            background-color: #45a049;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            resize: none;
            font-size: 14px;
        }
        video {
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            background: #222;
        }
    </style>
</head>
<body>

    <h1>Kaffeehaus Bestellung</h1>

    <div class="container">
        <h2 id="tisch-anzeige">Lade Tisch...</h2>
        <button class="btn" onclick="starteNativenScanner()">QR-Code scannen</button>
        <video id="scanner-video" autoplay playsinline></video>
    </div>

    <div class="container">
        <h3>Ihre Bestellung</h3>
        <textarea id="artikel-eingabe" placeholder="z.B. 1x Cappuccino, 1x Apfelkuchen..."></textarea>
        <button class="btn" onclick="sendeBestellung()">Bestellen</button>
    </div>

    <script>
        const bc = new BroadcastChannel('cafe_bestellungen');

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            let tisch = urlParams.get('tisch');

            if (tisch) {
                localStorage.setItem('aktuellerTisch', tisch);
            } else {
                tisch = localStorage.getItem('aktuellerTisch');
            }
            aktualisiereTischAnzeige();
        });

        function aktualisiereTischAnzeige() {
            const tisch = localStorage.getItem('aktuellerTisch');
            const anzeige = document.getElementById('tisch-anzeige');
            if (tisch) {
                anzeige.innerText = `Tisch Nummer: ${tisch}`;
            } else {
                anzeige.innerText = "Bitte QR-Code scannen";
            }
        }

        async function starteNativenScanner() {
            const video = document.getElementById('scanner-video');
            
            if (!('BarcodeDetector' in window)) {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.capture = 'environment';
                fileInput.click();
                
                fileInput.onchange = async (e) => {
                    alert("Automatischer Live-Scan im aktuellen Browser nicht unterstützt. Bitte nutzen Sie Google Chrome oder Samsung Internet.");
                };
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.style.display = "block";

                const barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
                
                const scanIntervall = setInterval(async () => {
                    try {
                        const barcodes = await barcodeDetector.detect(video);
                        if (barcodes.length > 0) {
                            const qrCodeUrl = barcodes[0].rawValue;
                            clearInterval(scanIntervall);
                            
                            stream.getTracks().forEach(track => track.stop());
                            video.style.display = "none";

                            const url = new URL(qrCodeUrl);
                            const tischParam = url.searchParams.get('tisch');
                            if (tischParam) {
                                localStorage.setItem('aktuellerTisch', tischParam);
                                aktualisiereTischAnzeige();
                                alert(`Tisch ${tischParam} erfolgreich erfasst!`);
                            }
                        }
                    } catch (err) {
                        console.error(err);
                    }
                }, 500);

            } catch (err) {
                alert("Kamera konnte nicht gestartet werden.");
            }
        }

        function sendeBestellung() {
            const tisch = localStorage.getItem('aktuellerTisch');
            const artikel = document.getElementById('artikel-eingabe').value.trim();

            if (!tisch) {
                alert("Fehler: Kein Tisch zugewiesen!");
                return;
            }
            if (!artikel) {
                alert("Bitte geben Sie eine Bestellung ein.");
                return;
            }

            const bestellDaten = { tisch: tisch, artikel: artikel };
            bc.postMessage(bestellDaten);

            alert("Bestellung erfolgreich abgesendet!");
            document.getElementById('artikel-eingabe').value = '';
        }
    </script>
</body>
</html>
