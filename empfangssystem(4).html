<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaffeekarte – Bestelleingang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #17120e; --bg2: #211812;
      --surface: rgba(255,248,238,0.08); --surface2: rgba(255,248,238,0.12);
      --border: rgba(245,220,178,0.16); --border2: rgba(245,220,178,0.28);
      --text: #F7EFE2; --text2: #B8A68E;
      --accent: #C8862A; --accent-bg: rgba(200,134,42,0.15); --accent-border: rgba(200,134,42,0.42); --accent-text: #F0C36A;
      --green: #97C459; --green-bg: rgba(151,196,89,0.13); --green-text: #CBE7A2; --green-border: rgba(151,196,89,0.32);
      --amber-bg: rgba(239,159,39,0.14); --amber-text: #FAC775; --amber-border: rgba(239,159,39,0.34);
      --purple-bg: rgba(127,119,221,0.13); --purple-text: #C4BEFF; --purple-border: rgba(127,119,221,0.34);
      --red-bg: rgba(226,75,74,0.13); --red-text: #F09595;
      --radius: 18px; --radius-sm: 12px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(200,134,42,0.22), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(127,119,221,0.12), transparent 32rem),
        linear-gradient(145deg, var(--bg), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
      background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border: 1px solid var(--border); border-radius: 22px; padding: 28px;
      box-shadow: 0 24px 70px rgba(0,0,0,.24); position: relative; overflow: hidden;
    }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 120%, rgba(200,134,42,.24), transparent 70%); pointer-events: none; }
    header > * { position: relative; z-index: 1; }
    .header-left h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 500; color: var(--text); line-height: 1; }
    .header-left p { font-size: 12px; color: var(--text2); margin-top: 8px; letter-spacing: .14em; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .live-indicator { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 7px 12px; backdrop-filter: blur(14px); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); box-shadow: 0 0 0 3px rgba(255,255,255,.04); }
    .dot.on { background: var(--green); } .dot.err { background: #E24B4A; }
    .btn-icon { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 8px 13px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s; }
    .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); transform: translateY(-1px); }
    .btn-icon.sound-on { color: var(--accent-text); border-color: var(--accent-border); background: var(--accent-bg); }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 18px 0 22px; }
    .stat { background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.045)); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px 16px; text-align: center; box-shadow: 0 14px 36px rgba(0,0,0,.14); }
    .stat .n { font-size: 32px; font-weight: 500; color: var(--text); line-height: 1; }
    .stat .l { font-size: 11px; color: var(--text2); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.10em; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .ftag { font-size: 12px; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,.03); color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .ftag:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }
    .ftag.active { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); font-weight: 500; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .toolbar span { font-size: 12px; color: var(--text2); }
    .orders-list { display: flex; flex-direction: column; gap: 12px; }
    .order-card { background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.045)); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: 0 16px 44px rgba(0,0,0,.16); }
    .order-card.is-new { border-color: var(--accent-border); box-shadow: 0 18px 48px rgba(200,134,42,.12); }
    .order-card.is-done { opacity: 0.48; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .order-card.animate { animation: slideIn 0.25s ease; }
    .oc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .oc-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge-table { background: var(--amber-bg); color: #FAC775; border: 1px solid rgba(239,159,39,0.4); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }
    .oc-num { font-size: 12px; font-weight: 500; color: var(--text2); }
    .badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
    .badge-new   { background: var(--accent-bg); color: var(--accent-text); border: 1px solid var(--accent-border); }
    .badge-ready { background: var(--amber-bg);  color: var(--amber-text);  border: 1px solid var(--amber-border); }
    .badge-done  { background: var(--green-bg);  color: var(--green-text);  border: 1px solid var(--green-border); }
    .badge-waiter { background: var(--purple-bg); color: var(--purple-text); border: 1px solid var(--purple-border); font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }
    .oc-time { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .oc-items { font-size: 15px; color: var(--text); line-height: 1.65; margin-bottom: 8px; }
    .oc-qty { color: var(--text2); font-size: 13px; }
    .oc-note { font-size: 12px; color: var(--text2); display: flex; align-items: flex-start; gap: 6px; margin-bottom: 10px; padding: 9px 11px; background: rgba(0,0,0,.14); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .oc-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--border); }
    .btn-action { font-size: 12px; padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,.03); color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn-action:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); transform: translateY(-1px); }
    .btn-progress { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }
    .btn-progress:hover { background: rgba(200,134,42,0.22); color: var(--accent-text); }
    .btn-done-action { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
    .btn-done-action:hover { background: rgba(151,196,89,0.2); }
    .btn-del:hover { background: var(--red-bg); color: var(--red-text); border-color: rgba(226,75,74,0.35); }
    .empty { text-align: center; padding: 52px 0; color: var(--text2); border: 1px dashed var(--border); border-radius: var(--radius); background: rgba(255,255,255,.03); }
    .empty i { font-size: 34px; display: block; margin: 0 auto 10px; opacity: 0.5; }
    .empty p { font-size: 14px; }
    @media (max-width: 640px) {
      body { padding: 14px 12px 36px; }
      header { padding: 22px; }
      .stats { grid-template-columns: 1fr; }
      .toolbar { align-items: flex-start; gap: 10px; flex-direction: column; }
      .oc-top { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Bestelleingang</h1>
      <p>Kaffeekarte – Empfangssystem</p>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="snd-btn" onclick="toggleSound()"><i class="ti ti-bell" aria-hidden="true"></i><span id="snd-label">Ton</span></button>
      <button class="btn-icon" onclick="clearDone()"><i class="ti ti-trash" aria-hidden="true"></i> Erledigte</button>
      <div class="live-indicator"><span class="dot" id="live-dot"></span><span id="live-label">Verbinde…</span></div>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="n" id="stat-total">0</div><div class="l">Gesamt</div></div>
    <div class="stat"><div class="n" id="stat-open">0</div><div class="l">Offen</div></div>
    <div class="stat"><div class="n" id="stat-done">0</div><div class="l">Fertig</div></div>
  </div>

  <div class="filters">
    <button class="ftag active" data-f="all"   onclick="setFilter('all')">Alle</button>
    <button class="ftag"        data-f="new"   onclick="setFilter('new')">Neu</button>
    <button class="ftag"        data-f="ready" onclick="setFilter('ready')">In Zubereitung</button>
    <button class="ftag"        data-f="done"  onclick="setFilter('done')">Ausgegeben</button>
  </div>

  <div class="toolbar">
    <span id="count-label"></span>
    <button class="btn-icon" onclick="addDemo()"><i class="ti ti-plus" aria-hidden="true"></i> Testbestellung</button>
  </div>

  <div class="orders-list" id="orders-list"></div>
</div>

<script>
const ABLY_KEY = "IBM0rw.gGiVMw:X9LuWW5mM497fbE2SDIuLQrVE7DIj6HltJVriS48a1c";
let orders = [];
let filter = "all";
let soundOn = false;
let audioCtx = null;
let channel;

const ably = new Ably.Realtime({ key: ABLY_KEY });
ably.connection.on('connected', () => {
  document.getElementById('live-dot').className = 'dot on';
  document.getElementById('live-label').textContent = 'Live';
});
ably.connection.on('failed', () => {
  document.getElementById('live-dot').className = 'dot err';
  document.getElementById('live-label').textContent = 'Fehler';
});
ably.connection.on('disconnected', () => {
  document.getElementById('live-dot').className = 'dot err';
  document.getElementById('live-label').textContent = 'Getrennt';
});

channel = ably.channels.get('kaffee-bestellungen');
channel.subscribe('neue-bestellung', (msg) => {
  orders.unshift(msg.data);
  playBeep();
  render(true);
});
channel.subscribe('status-update', (msg) => {
  const o = orders.find(x => x.id === msg.data.id);
  if (o) { o.status = msg.data.status; render(false); }
});
channel.subscribe('delete-order', (msg) => {
  orders = orders.filter(x => x.id !== msg.data.id);
  render(false);
});

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('snd-label').textContent = soundOn ? 'Ton an' : 'Ton';
  document.getElementById('snd-btn').classList.toggle('sound-on', soundOn);
}

function playBeep() {
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = "sine"; osc.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch(e) {}
}

const demoItems = [
  [{name:"Espresso",qty:1},{name:"Cappuccino",qty:2}],
  [{name:"Iced Latte",qty:1},{name:"Flat White",qty:1}],
  [{name:"Americano",qty:3}],
  [{name:"Latte Macchiato",qty:1}],
];
function addDemo() {
  const pick = demoItems[Math.floor(Math.random() * demoItems.length)];
  const order = { id: Date.now(), time: new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}), items: pick, note: "", status: "new" };
  orders.unshift(order);
  channel.publish("neue-bestellung", order);
  playBeep();
  render(true);
}

function setStatus(id, status) {
  const o = orders.find(x => x.id === id);
  if (o) { o.status = status; channel.publish("status-update", {id, status}); render(false); }
}

function deleteOrder(id) {
  orders = orders.filter(x => x.id !== id);
  channel.publish("delete-order", {id});
  render(false);
}

function clearDone() {
  const doneIds = orders.filter(x => x.status === "done").map(x => x.id);
  orders = orders.filter(x => x.status !== "done");
  doneIds.forEach(id => channel.publish("delete-order", {id}));
  render(false);
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll(".ftag").forEach(t => t.classList.toggle("active", t.dataset.f === f));
  render(false);
}

function render(animate) {
  const total = orders.length;
  const open  = orders.filter(o => o.status !== "done").length;
  const done  = orders.filter(o => o.status === "done").length;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-open").textContent  = open;
  document.getElementById("stat-done").textContent  = done;

  const filtered = filter === "all" ? orders : orders.filter(o => o.status === filter);
  document.getElementById("count-label").textContent = `${filtered.length} Bestellung${filtered.length !== 1 ? "en" : ""}`;

  const list = document.getElementById("orders-list");
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><i class="ti ti-inbox" aria-hidden="true"></i><p>Keine Bestellungen${filter !== "all" ? " in dieser Kategorie" : ""}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(o => {
    const itemsHtml = o.items.map(i => `${i.name}${i.qty > 1 ? ` <span class="oc-qty">×${i.qty}</span>` : ""}`).join(" &nbsp;·&nbsp; ");
    const badge = o.status === "new"
      ? `<span class="badge badge-new">Neu</span>`
      : o.status === "ready"
      ? `<span class="badge badge-ready">Zubereitung</span>`
      : `<span class="badge badge-done">Ausgegeben</span>`;
    let actions = "";
    if (o.status === "new") {
      actions = `<button class="btn-action btn-progress" onclick="setStatus(${o.id},'ready')"><i class="ti ti-coffee" aria-hidden="true"></i> In Zubereitung</button><button class="btn-action btn-del" onclick="deleteOrder(${o.id})" aria-label="Löschen"><i class="ti ti-trash" aria-hidden="true"></i></button>`;
    } else if (o.status === "ready") {
      actions = `<button class="btn-action btn-done-action" onclick="setStatus(${o.id},'done')"><i class="ti ti-check" aria-hidden="true"></i> Ausgegeben</button><button class="btn-action" onclick="setStatus(${o.id},'new')"><i class="ti ti-arrow-left" aria-hidden="true"></i> Zurück</button><button class="btn-action btn-del" onclick="deleteOrder(${o.id})" aria-label="Löschen"><i class="ti ti-trash" aria-hidden="true"></i></button>`;
    } else {
      actions = `<button class="btn-action btn-del" onclick="deleteOrder(${o.id})"><i class="ti ti-trash" aria-hidden="true"></i> Löschen</button>`;
    }
    return `<div class="order-card ${o.status==='new'?'is-new':''} ${o.status==='done'?'is-done':''} ${animate?'animate':''}">
      <div class="oc-top"><div class="oc-left"><span class="oc-num">#${String(o.id).slice(-4)}</span>${badge}${o.table ? `<span class="badge-table"><i class="ti ti-armchair" aria-hidden="true"></i> Tisch ${o.table}</span>` : ""}${o.waiter ? `<span class="badge-waiter"><i class="ti ti-user" aria-hidden="true"></i> ${o.waiter}</span>` : ""}</div><span class="oc-time"><i class="ti ti-clock" aria-hidden="true"></i> ${o.time}</span></div>
      <div class="oc-items">${itemsHtml}</div>
      ${o.note ? `<div class="oc-note"><i class="ti ti-message" aria-hidden="true"></i> ${o.note}</div>` : ""}
      <div class="oc-actions">${actions}</div>
    </div>`;
  }).join("");
}

render(false);
</script>
</body>
</html>
